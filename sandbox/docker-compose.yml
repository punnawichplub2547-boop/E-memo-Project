services:
  hr-ememo:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hr-ememo
    depends_on:
      hr-ememo-mysql:
        condition: service_healthy
    ports:
      - "3000:3000"
    env_file:
      - path: .env.local
        required: false
    environment:
      DATABASE_URL: mysql://${MYSQL_USER:-hr_ememo}:${MYSQL_PASSWORD:-hr_ememo_dev_password}@hr-ememo-mysql:3306/${MYSQL_DATABASE:-hr_ememo}
    restart: unless-stopped

  hr-ememo-mysql:
    image: mysql:8.4
    container_name: hr-ememo-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-hr_ememo}
      MYSQL_USER: ${MYSQL_USER:-hr_ememo}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-hr_ememo_dev_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-hr_ememo_root_password}
      TZ: UTC
    ports:
      - "${MYSQL_HOST_PORT:-3307}:3306"
    volumes:
      - hr-ememo-mysql-data:/var/lib/mysql
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  hr-ememo-mysql-data:
