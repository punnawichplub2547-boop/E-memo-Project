services:
  hr-ememo-sandbox:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hr-ememo-sandbox
    restart: unless-stopped
    depends_on:
      hr-ememo-db:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      DATABASE_URL: mysql://${MYSQL_USER:-hr_ememo}:${MYSQL_PASSWORD:-hr_ememo_dev_password}@hr-ememo-db:3306/${MYSQL_DATABASE:-hr_ememo}
    volumes:
      # Persist uploaded attachment binaries so they survive container rebuild/recreate.
      # Runtime cwd is /app, so the app writes to /app/storage/attachments.
      - hr-ememo-attachments-data:/app/storage/attachments

  hr-ememo-db:
    image: mysql:8.4
    container_name: hr-ememo-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-hr_ememo}
      MYSQL_USER: ${MYSQL_USER:-hr_ememo}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-hr_ememo_dev_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-hr_ememo_root_password}
      TZ: UTC
    ports:
      - "${MYSQL_HOST_PORT:-3307}:3306"
    volumes:
      - hr-ememo-db-data:/var/lib/mysql
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  hr-ememo-db-data:
  hr-ememo-attachments-data:
